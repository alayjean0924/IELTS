<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ms. Jin's 雅思閱讀複習導航</title>
    <style>
        body { font-family: 'PingFang TC', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .container { max-width: 800px; width: 100%; text-align: center; }
        h1 { color: #2c3e50; font-size: 2.5rem; margin-bottom: 10px; }
        .subtitle { color: #4a90e2; font-weight: bold; margin-bottom: 40px; }
        
        /* 自動生成的按鈕清單容器 */
        .unit-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        
        .unit-card {
            background: white; padding: 25px; border-radius: 20px; text-decoration: none;
            color: #34495e; font-size: 1.2rem; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.3s ease; border: 2px solid transparent;
        }
        .unit-card:hover {
            transform: translateY(-5px); border-color: #4a90e2; color: #4a90e2;
            box-shadow: 0 15px 30px rgba(74,144,226,0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Ms. Jin's 雅思閱讀複習字卡</h1>
        <p class="subtitle">請選擇練習單元</p>

        <div class="unit-grid">
            {% for post in site.pages %}
                {% if post.title and post.url != "/" %}
                <a href="{{ post.url | relative_url }}" class="unit-card">
                    📖 {{ post.title }}
                </a>
                {% endif %}
            {% endfor %}
        </div>
    </div>

</body>
</html>
