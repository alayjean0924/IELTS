<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ms. Jin's 雅思閱讀導航首頁</title>
    <style>
        body { font-family: 'PingFang TC', sans-serif; background: #f5f7fa; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 800px; margin-top: 30px; }
        .card { background: white; padding: 25px; border-radius: 15px; text-decoration: none; color: #34495e; font-weight: bold; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; border: 2px solid transparent; }
        .card:hover { transform: translateY(-5px); border-color: #4a90e2; color: #4a90e2; }
    </style>
</head>
<body>
    <h1>Ms. Jin's 雅思閱讀複習字卡</h1>
    <div class="grid">
        {% for page in site.pages %}
            {% if page.title and page.url != "/" %}
                <a href="{{ page.url | relative_url }}" class="card">
                    📖 {{ page.title }}
                </a>
            {% endif %}
        {% endfor %}
    </div>
</body>
</html>
