        {id:38,w:"hectic",loc:"Norton",s:"The holidays can be a hectic time, and we might let our guard down.",m:"忙碌的/鬧哄哄的",pos:"adj.",sz:"假期可能是一個忙碌的時期，我們可能會放下戒心。",syn:"busy",syne:"it is the busiest time of the year for shoppers."},
        {id:39,w:"wary",loc:"Norton",s:"Rise in crime has made shoppers feel less merry and more wary.",m:"謹慎的/提防的",pos:"adj.",sz:"犯罪的興起使購物者感到不快且更加警惕。",syn:"cautious",syne:"always stay cautious when encountering suspicious online offers."},
        {id:40,w:"sophisticated",loc:"Norton",s:"47% of shoppers worry about sophisticated holiday shopping scams.",m:"複雜精密的",pos:"adj.",sz:"47% 的購物者擔心複雜的假日購物詐騙。",syn:"advanced",syne:"criminals use advanced software to download malware onto devices."},
        {id:41,w:"abandon",loc:"Norton",s:"57% of people say they would abandon their carts if they only speak with a chatbot.",m:"放棄/拋棄",pos:"v.",sz:"57% 的人表示若只能跟機器人說話，他們會拋棄購物車。",syn:"discard",syne:"shoppers discard items if the payment process is complex."},
        {id:42,w:"legitimate",loc:"Norton",s:"Scammers clone legitimate retailer websites to trick consumers.",m:"合法的/正當的",pos:"adj.",sz:"騙子複製合法的零售商網站來欺騙消費者。",syn:"authentic",syne:"check for authentic certification before buying from an online store."},
        {id:43,w:"initially",loc:"IELTS 1",s:"The product created more profit than initially expected after launch.",m:"最初地",pos:"adv.",sz:"產品在上市後創造了高於最初預期的利潤。",syn:"at first",syne:"at first, victims are drawn in by visually attractive advertisements."},
        {id:44,w:"dispute",loc:"Norton",s:"You can dispute the charge with your credit card company if billed twice.",m:"爭議/對...提出異議",pos:"v.",sz:"如果你被收兩次費，可以向信用卡公司提出爭議。",syn:"challenge",syne:"individuals are urged to challenge unauthorized payments."}
    ];

    const moePool = {
        "n.": [{w:"safety", m:"安全"}, {w:"target", m:"目標"}, {w:"logic", m:"邏輯"}, {w:"method", m:"方法"}],
        "v.": [{w:"attack", m:"攻擊"}, {w:"ignore", m:"忽略"}, {w:"manage", m:"管理"}, {w:"confirm", m:"確認"}],
        "adj.": [{w:"stable", m:"穩定的"}, {w:"common", m:"常見的"}, {w:"direct", m:"直接的"}, {w:"global", m:"全球的"}],
        "adv.": [{w:"clearly", m:"清楚地"}, {w:"actually", m:"實際上"}, {w:"totally", m:"完全地"}],
        "V.phr": [{w:"look after", m:"照顧"}, {w:"give up", m:"放棄"}, {w:"run out", m:"用完"}],
        "N.phr": [{w:"safety net", m:"安全網"}, {w:"life goal", m:"人生目標"}, {w:"system", m:"系統"}]
    };

    let sessionWords = []; let curIdx = 0; let mode = ''; let score = 0; let done = {}; 
    let studentAnswers = {}; let targetCount = 10;

    function selectCount(n) { targetCount = n; document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected')); event.target.classList.add('selected'); }
    function updateStats() { document.getElementById('pool-info').innerText = "字庫項目: " + rawData.length; }

    function start(m) {
        mode = m; curIdx = 0; score = 0; done = {}; studentAnswers = {};
        let pool = [...rawData].sort(() => 0.5 - Math.random());
        sessionWords = pool.slice(0, Math.min(targetCount, rawData.length)).map(item => {
            let candidates = (moePool[item.pos] || moePool["n."]);
            let selectedDistractors = candidates.sort(() => 0.5 - Math.random()).slice(0, 3);
            let options = [...selectedDistractors, {w: item.w, m: item.m}].sort(() => 0.5 - Math.random());
            return { ...item, fixedOptions: options };
        });
        document.getElementById('home-screen').classList.remove('active');
        document.getElementById('main-screen').classList.add('active');
        document.getElementById('mode-label').innerText = mode === 'review' ? '複習模式' : '測驗模式';
        render();
    }

    function render() {
        if (curIdx >= sessionWords.length) { showFinal(); return; }
        const item = sessionWords[curIdx]; const isDone = done[curIdx] !== undefined;
        document.getElementById('progress-label').innerText = `${curIdx + 1} / ${sessionWords.length}`;
        document.getElementById('main-card-inner').classList.remove('is-flipped');
        
        const quizStem = document.getElementById('quiz-stem-area');
        const frontMeta = document.getElementById('front-meta');
        const quizOptions = document.getElementById('quiz-options-area');
        const reviewLayer = document.getElementById('review-visual-layer');

        if (mode === 'review') {
            quizStem.style.display = 'none'; quizOptions.style.display = 'none'; frontMeta.style.display = 'block';
            reviewLayer.style.display = 'block'; 
            document.getElementById('display-word').innerText = item.w;
            document.getElementById('front-pos').innerText = item.pos;
            document.getElementById('front-loc').innerText = item.loc;
            document.getElementById('review-sent').innerText = item.s;
            const synBox = document.getElementById('front-synonym-box');
            if (item.syn) {
                document.getElementById('syn-word-display').innerText = item.syn.toLowerCase();
                document.getElementById('syn-ex-display').innerText = "💡 " + (item.syne || "");
                synBox.style.display = 'block';
            } else { synBox.style.display = 'none'; }
        } else {
            reviewLayer.style.display = 'none';
            frontMeta.style.display = isDone ? 'block' : 'none'; 
            quizStem.style.display = 'block'; quizOptions.style.display = 'block';
            document.getElementById('display-word').innerText = item.w;
            document.getElementById('front-pos').innerText = item.pos;
            document.getElementById('front-loc').innerText = item.loc;

            const fb = document.getElementById('feedback-area'); const opts = document.getElementById('initial-options');
            if (isDone) {
                opts.style.display = 'none'; fb.style.display = 'block';
                quizStem.innerText = item.s; 
                updateFB(item);
            } else {
                fb.style.display = 'none'; opts.style.display = 'grid';
                
                let stemText = item.s;
                let wordToHide = item.w.trim();
                let displayHTML = stemText;

                if (wordToHide.startsWith('be ')) {
                    let coreWord = wordToHide.replace('be ', '').split(' ')[0];
                    let remaining = wordToHide.split(' ').slice(2).join(' ');
                    let bePattern = new RegExp(`(is|am|are|was|were|been|be|themselves)\\s+([a-z]+\\s+)*${coreWord}(ed|ing|s|es)?\\s+${remaining}`, 'gi');
                    displayHTML = stemText.replace(bePattern, (match, p1) => {
                        return p1 === 'themselves' ? 'themselves <span class="blank-text"> </span>' : '<span class="blank-text"> </span>';
                    });
                }

                if (displayHTML === stemText) {
                    let pattern;
                    if (wordToHide.includes(' ')) {
                        let parts = wordToHide.split(/\s+/);
                        let regexStr = `\\b${parts[0]}(ed|ing|s|es)?`; 
                        for(let i=1; i<parts.length; i++) {
                            regexStr += `\\s+${parts[i]}`;
                        }
                        pattern = new RegExp(regexStr + `\\b`, 'gi');
                    } else {
                        pattern = new RegExp(`\\b${wordToHide}(ed|ing|s|es)?\\b`, 'gi');
                    }
                    displayHTML = stemText.replace(pattern, '<span class="blank-text"> </span>');
                }
                
                if (displayHTML === stemText) {
                    let firstWord = wordToHide.split(' ')[0];
                    if (firstWord === 'be' && wordToHide.split(' ').length > 1) firstWord = wordToHide.split(' ')[1];
                    let loosePattern = new RegExp(`\\b${firstWord}[a-z]*\\b`, 'i');
                    displayHTML = stemText.replace(loosePattern, '<span class="blank-text"> </span>');
                }

                quizStem.innerHTML = displayHTML;
                renderOptions(item);
            }
        }
        document.getElementById('back-word-zh').innerText = item.m;
        document.getElementById('back-sent-zh').innerText = item.sz;
    }

    function renderOptions(item) {
        const container = document.getElementById('initial-options'); container.innerHTML = '';
        item.fixedOptions.forEach(opt => {
            const b = document.createElement('button'); b.className = 'opt-btn'; b.innerText = opt.w;
            b.onclick = (e) => { e.stopPropagation(); studentAnswers[curIdx] = opt.w; checkAns(opt.w === item.w); };
            container.appendChild(b);
        });
    }

    function checkAns(isCorrect) { if (isCorrect) score++; done[curIdx] = isCorrect; render(); }
    function updateFB(item) {
        const correct = done[curIdx]; const fb = document.getElementById('feedback-area');
        document.getElementById('fb-status').innerText = correct ? '✓ Correct!' : '✗ Incorrect';
        document.getElementById('fb-status').style.color = correct ? 'var(--success)' : 'var(--danger)';
        document.getElementById('fb-sent-full').innerText = item.s;
        document.getElementById('fb-sent-zh').innerText = "解析翻譯：" + item.sz;
        const area = document.getElementById('fb-options-static'); area.innerHTML = '';
        item.fixedOptions.forEach(opt => {
            const d = document.createElement('div'); d.className = 'opt-btn ' + (opt.w === item.w ? 'correct-style' : (studentAnswers[curIdx] === opt.w ? 'wrong-style' : ''));
            d.innerHTML = `<div>${opt.w}</div><div style="font-size:0.8rem; opacity:0.8">${opt.m}</div>`;
            d.style.textAlign = 'center'; area.appendChild(d);
        });
    }
    function flipCard() { document.getElementById('main-card-inner').classList.toggle('is-flipped'); }
    function moveStep(n) { let next = curIdx + n; if (next >= sessionWords.length) { showFinal(); } else if (next >= 0) { curIdx = next; render(); } }
    function showFinal() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('result-screen').classList.add('active');
        if (mode === 'quiz') { 
            document.getElementById('quiz-reveal-actions').style.display = 'block'; 
            document.getElementById('quiz-report-view').style.display = 'none'; 
            document.getElementById('final-title').innerText = "🏆 測驗完成！"; 
        } else { 
            document.getElementById('quiz-reveal-actions').style.display = 'none'; 
            revealReport(); 
            document.getElementById('final-title').innerText = "🏆 複習完成！"; 
        }
    }
    function revealReport() {
        document.getElementById('quiz-reveal-actions').style.display = 'none';
        document.getElementById('quiz-report-view').style.display = 'block';
        const rate = Math.round((score/sessionWords.length)*100);
        document.getElementById('final-score').innerText = mode === 'review' ? "複習完畢" : `${rate}%`;
        document.getElementById('final-stats').innerText = mode === 'review' ? `今日複習了 ${sessionWords.length} 個單字` : `總答對率：${rate}% | 實得題數：${score} / ${sessionWords.length}`;
        const listArea = document.getElementById('report-list-view'); listArea.innerHTML = '';
        sessionWords.forEach((item, index) => {
            const isCorrect = done[index]; const div = document.createElement('div'); div.className = 'result-item';
            if (mode === 'quiz') {
                div.innerHTML = `<div style="font-weight:bold; margin-bottom:5px;">題 ${index + 1}：${item.s}</div>
                    <div>你的作答：<span class="${isCorrect ? 'text-green' : 'text-red'}">${studentAnswers[index] || "（跳過）"}</span></div>
                    <div class="text-green">正確答案：${item.w} (${item.m})</div>`;
            } else {
                div.innerHTML = `<div style="font-weight:bold; margin-bottom:5px;">${item.s}</div><div class="text-green">正確單字：${item.w} (${item.m})</div>`;
            }
            listArea.appendChild(div);
        });
    }
    function playAudio(type) {
        const item = sessionWords[curIdx]; if(!item) return;
        const utter = new SpeechSynthesisUtterance(type === 'word' ? item.w : item.s);
        utter.lang = 'en-US'; window.speechSynthesis.speak(utter);
    }
    function goHome() { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById('home-screen').classList.add('active'); updateStats(); }
    window.onload = updateStats;
</script>
</body>
</html>
